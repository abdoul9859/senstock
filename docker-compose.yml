services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mbayestock
      - POSTGRES_USER=mbayestock
      - POSTGRES_PASSWORD=mbayestock_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbayestock"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://mbayestock:mbayestock_pass@postgres:5432/mbayestock
      - JWT_SECRET=mbayestock_jwt_secret_change_me
      - ADMIN_NAME=Admin
      - ADMIN_EMAIL=admin@mbayestock.com
      - ADMIN_PASSWORD=admin123
      - PORT=5000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-price_pro_placeholder}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-price_enterprise_placeholder}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - SMTP_HOST=${SMTP_HOST:-smtp_placeholder}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-StockFlow <noreply@stockflow.app>}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-evo_stockflow_secret_key}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-stockflow}

  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - server

  studio:
    image: supabase/studio:20240101-8e4a094
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://pg-meta:8080
      SUPABASE_URL: http://localhost:3000
      SUPABASE_REST_URL: http://localhost:3001
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      NEXT_PUBLIC_ENABLE_LOGS: false

  pg-meta:
    image: supabase/postgres-meta:v0.83.2
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: postgres
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: mbayestock
      PG_META_DB_USER: mbayestock
      PG_META_DB_PASSWORD: mbayestock_pass

  mobile:
    build: ./mobile
    ports:
      - "8081:8081"
    depends_on:
      - server

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances
    environment:
      - SERVER_URL=http://localhost:8085
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://mbayestock:mbayestock_pass@postgres:5432/mbayestock?schema=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-evo_stockflow_secret_key}
      - LOG_LEVEL=WARN
    restart: unless-stopped

volumes:
  pg_data:
  uploads_data:
  evolution_data:
