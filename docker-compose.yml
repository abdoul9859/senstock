services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=senstock
      - POSTGRES_USER=senstock
      - POSTGRES_PASSWORD=senstock_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senstock"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://senstock:senstock_pass@postgres:5432/senstock
      - JWT_SECRET=senstock_jwt_secret_change_me
      - ADMIN_NAME=Admin
      - ADMIN_EMAIL=admin@senstock.com
      - ADMIN_PASSWORD=admin123
      - PORT=5000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-price_pro_placeholder}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-price_enterprise_placeholder}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - SMTP_HOST=${SMTP_HOST:-smtp_placeholder}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-SenStock <noreply@senstock.app>}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-evo_senstock_secret_key}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-senstock}

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances
    environment:
      - SERVER_URL=http://localhost:8085
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://senstock:senstock_pass@postgres:5432/senstock?schema=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-evo_senstock_secret_key}
      - LOG_LEVEL=WARN
    restart: unless-stopped

volumes:
  pg_data:
  uploads_data:
  evolution_data:
